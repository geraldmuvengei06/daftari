<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners for app icon -->
  <rect width="1024" height="1024" rx="224" fill="#0F172A"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bgGradient)"/>
  
  <!-- Stylized "D" that looks like an open book/ledger -->
  <g transform="translate(220, 200)">
    <!-- Book spine (left side of D) -->
    <rect x="0" y="0" width="100" height="624" rx="20" fill="url(#bookGradient)"/>
    
    <!-- Book curve (right side of D) -->
    <path d="M80 0 H300 C450 0 584 140 584 312 C584 484 450 624 300 624 H80 V580 H280 C410 580 540 460 540 312 C540 164 410 44 280 44 H80 Z" fill="url(#bookGradient)"/>
    
    <!-- Inner page area -->
    <path d="M100 60 H260 C370 60 480 170 480 312 C480 454 370 564 260 564 H100 V520 H240 C330 520 436 420 436 312 C436 204 330 104 240 104 H100 Z" fill="#1E293B"/>
    
    <!-- Page lines -->
    <rect x="140" y="180" width="180" height="16" rx="8" fill="#475569"/>
    <rect x="140" y="240" width="140" height="16" rx="8" fill="#475569"/>
    <rect x="140" y="300" width="160" height="16" rx="8" fill="#475569"/>
    
    <!-- Checkmark for completed items -->
    <g transform="translate(140, 380)">
      <circle cx="20" cy="20" r="20" fill="#22C55E" fill-opacity="0.3"/>
      <path d="M10 20 L16 26 L30 12" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="180" y="388" width="120" height="16" rx="8" fill="#22C55E"/>
    
    <!-- KES currency indicator -->
    <g transform="translate(320, 140)">
      <circle cx="40" cy="40" r="40" fill="#F59E0B" fill-opacity="0.3"/>
      <text x="40" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#F59E0B" text-anchor="middle">K</text>
    </g>
  </g>
</svg>
